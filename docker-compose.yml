services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kr-backend
    ports:
      - "8008:8000"
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kr-net
    restart: unless-stopped

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8008
    container_name: kr-ui
    ports:
      - "3008:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - kr-net
    restart: unless-stopped

networks:
  kr-net:
    driver: bridge
